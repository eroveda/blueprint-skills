# ══════════════════════════════════════════════════════════════════
# Industrial Machine Monitoring System — Executable Specifications
# Generated from SWEBOK decomposition: 36 nodes, 3 layers
# ══════════════════════════════════════════════════════════════════

# ┌─────────────────────────────────────────────────┐
# │           EXECUTION ORDER                       │
# └─────────────────────────────────────────────────┘

execution_order:
  - phase: 1
    specs:
      - "L1-01: Firmware Project Bootstrap"
      - "L2-01: Backend Project Bootstrap"
      - "L3-01: Frontend Project Bootstrap"
    reason: "No dependencies — each layer bootstraps independently"

  - phase: 2
    specs:
      - "L1-02: Vibration Sensor Driver and Sampling"
      - "L1-04: MQTT Message Schema Definition"
      - "L1-12: Watchdog and Crash Recovery"
      - "L2-02: Data Models"
      - "L2-14: Deployment Pipeline"
      - "L3-02: UI Component Library and Layout"
    reason: "Depend only on their layer's bootstrap"

  - phase: 3
    specs:
      - "L1-03: Signal Processing Pipeline"
      - "L1-05: WiFi and MQTT Connectivity"
      - "L2-03: API Contract Definition"
      - "L2-04: Authentication and RBAC"
      - "L2-05: MQTT Ingestion Service"
    reason: "Depend on Phase 2 outputs (sensor driver, schemas, data models)"

  - phase: 4
    specs:
      - "L1-06: Data Buffering for Offline Operation"
      - "L1-07: Edge Anomaly Detection and Local Alerting"
      - "L1-08: Remote Configuration and OTA Updates"
      - "L1-09: Device Health Telemetry"
      - "L1-10: Power Management"
      - "L1-11: Secure Communication"
      - "L2-06: Anomaly Detection Engine"
      - "L2-08: Time-Series Query API"
      - "L2-09: Machine and Sensor Management API"
      - "L2-10: Device Configuration Push"
      - "L2-12: User Management API"
      - "L2-13: TSDB Retention and Downsampling"
      - "L3-03: Authentication Flow"
    reason: "Depend on connectivity, DSP, API contract, and auth modules"

  - phase: 5
    specs:
      - "L2-07: Alert Management Service"
      - "L2-11: WebSocket Real-Time Events"
      - "L3-09: Real-Time WebSocket Integration"
    reason: "Depend on anomaly detection, ingestion, and auth"

  - phase: 6
    specs:
      - "L3-04: Machine Fleet Overview Page"
      - "L3-05: Machine Detail View with Vibration Charts"
      - "L3-06: Alert Dashboard and Management"
      - "L3-07: Device Management Page"
      - "L3-08: User Administration Page"
      - "L3-10: Frontend Build and Deployment"
    reason: "Depend on backend APIs and WebSocket — final integration layer"


# ══════════════════════════════════════════════════════════════════
#  LAYER 1: ESP32 SENSOR FIRMWARE
# ══════════════════════════════════════════════════════════════════

specs:

  # ─────────────────────────────────────────────────
  # L1-01: Firmware Project Bootstrap
  # ─────────────────────────────────────────────────
  - title: "L1-01: Firmware Project Bootstrap (ESP-IDF/PlatformIO)"
    purpose: "Initialize the ESP32 firmware project with build system, partition table, and base configuration"
    category: "OPERATIONS"

    input_context: |
      Starting from scratch. No prior code exists.
      Target hardware: ESP32-S3 or ESP32-WROOM-32.
      Toolchain: ESP-IDF v5.x with PlatformIO or native idf.py.

    instructions:
      - "Create project directory firmware/ with standard ESP-IDF structure: main/, components/, partitions.csv, sdkconfig.defaults"
      - "Configure partitions.csv with: nvs (24KB), otadata (8KB), ota_0 (1.5MB), ota_1 (1.5MB), spiffs (64KB for certs)"
      - "Create sdkconfig.defaults with: CONFIG_FREERTOS_HZ=1000, CONFIG_ESP_TASK_WDT_TIMEOUT_S=10, CONFIG_MQTT_TRANSPORT_SSL=y, CONFIG_SPIRAM_USE_MALLOC=y"
      - "Create main/main.c with app_main() that initializes NVS, logs firmware version, and enters an idle loop"
      - "Create components/ directory structure for: sensor_driver/, signal_processing/, mqtt_client/, config_manager/, health_monitor/"
      - "Add CMakeLists.txt for each component with proper REQUIRES declarations"
      - "Create a build script (build.sh) that runs idf.py build and outputs firmware.bin size"
      - "Verify project compiles and generates firmware.bin"

    constraints:
      - "Must use ESP-IDF v5.x (not Arduino framework) for RTOS and peripheral control"
      - "Partition table must support OTA (dual app partitions)"
      - "PSRAM must be enabled for data buffering"
      - "FreeRTOS tick rate 1000Hz for 1ms timing resolution"

    acceptance_criteria:
      - "idf.py build completes without errors"
      - "firmware.bin size < 1.5MB (fits in OTA partition)"
      - "Partition table validates with espressif partition tool"
      - "NVS initializes successfully on boot (serial output confirms)"

    dependencies:
      hard: []
      integrates_with: []

    handoff: |
      Provides:
      - Project structure with component directories
      - Build system ready for incremental component development
      - NVS flash initialized for key-value storage
      - FreeRTOS environment with 1ms tick resolution

    verification: "idf.py build && idf.py size"


  # ─────────────────────────────────────────────────
  # L1-02: Vibration Sensor Driver and Sampling
  # ─────────────────────────────────────────────────
  - title: "L1-02: Vibration Sensor Driver and Sampling"
    purpose: "Implement accelerometer driver to capture raw vibration data at 1kHz into a DMA buffer"
    category: "CONSTRUCTION"

    input_context: |
      Firmware project bootstrapped (L1-01).
      Component directory: components/sensor_driver/
      FreeRTOS available with 1ms tick.
      PSRAM enabled for large buffers.
      Target sensor: ADXL345 (SPI) or MPU6050 (I2C) — support both via abstraction.

    instructions:
      - "Create components/sensor_driver/include/sensor_driver.h with: sensor_init(config), sensor_read_sample(sample_t*), sensor_start_continuous(callback), sensor_stop()"
      - "Define sample_t struct: {int16_t x, y, z; int64_t timestamp_us;}"
      - "Define sensor_config_t: {sensor_type_t type; uint16_t sample_rate_hz; gpio_num_t spi_cs/i2c_sda/i2c_scl; uint8_t i2c_addr;}"
      - "Implement ADXL345 SPI driver in sensor_adxl345.c: init registers for full resolution ±16g, configure FIFO watermark, read via DMA SPI transaction"
      - "Implement MPU6050 I2C driver in sensor_mpu6050.c: init registers for ±8g range, 1kHz ODR, DLPF at 42Hz"
      - "Create a FreeRTOS task (sensor_task) pinned to core 1, priority 20, that reads samples at configured rate into a ring buffer"
      - "Ring buffer: 4096 samples in PSRAM, lock-free single-producer/single-consumer using atomic read/write indices"
      - "Add configurable sampling rate (100Hz, 500Hz, 1000Hz) via sensor_config_t"
      - "Add unit test in test/test_sensor_driver.c: verify ring buffer wrap-around, overflow behavior, and sample timestamp monotonicity"

    constraints:
      - "Sampling task must run on dedicated core (core 1) to avoid jitter"
      - "Maximum allowable jitter: ±50µs at 1kHz"
      - "Ring buffer must not allocate dynamically after init"
      - "Must support hot-swap between ADXL345 and MPU6050 via config"

    acceptance_criteria:
      - "Sensor initializes and reads non-zero values on connected hardware"
      - "Ring buffer stores 4096 samples without corruption"
      - "Sample timestamps are monotonically increasing"
      - "Buffer overflow drops oldest samples (no crash)"
      - "Sampling rate matches configured value within ±2%"
      - "Unit tests pass: idf.py -T test build && run"

    dependencies:
      hard:
        - "L1-01: Firmware Project Bootstrap"
      integrates_with: []

    handoff: |
      Provides:
      - sensor_driver component with sensor_init(), sensor_read_sample(), sensor_start_continuous()
      - Ring buffer API for consuming raw samples: ring_buffer_read(buf, count)
      - sample_t struct with x/y/z acceleration and microsecond timestamp

    verification: "idf.py build && idf.py -T sensor_driver test"


  # ─────────────────────────────────────────────────
  # L1-03: Signal Processing Pipeline
  # ─────────────────────────────────────────────────
  - title: "L1-03: Signal Processing Pipeline"
    purpose: "Process raw vibration samples into frequency-domain features: FFT, RMS velocity, and peak acceleration"
    category: "CONSTRUCTION"

    input_context: |
      Sensor driver (L1-02) provides raw samples via ring buffer.
      Component directory: components/signal_processing/
      PSRAM available for FFT working memory.
      ESP-DSP library available for optimized FFT.

    instructions:
      - "Create components/signal_processing/include/signal_processing.h with: dsp_init(config), dsp_process_window(samples, count, result_t*)"
      - "Define vibration_result_t: {float rms_accel_g; float peak_accel_g; float rms_velocity_mm_s; float dominant_freq_hz; float fft_magnitudes[FFT_SIZE/2]; int64_t window_start_us; int64_t window_end_us;}"
      - "Implement Hanning window function applied to raw samples before FFT"
      - "Implement 1024-point FFT using esp-dsp dsps_fft2r_fc32 (real-valued optimized)"
      - "Calculate magnitude spectrum from FFT output: mag[i] = sqrt(re[i]^2 + im[i]^2) / (N/2)"
      - "Find dominant frequency: index of max magnitude × (sample_rate / FFT_SIZE)"
      - "Calculate RMS acceleration: sqrt(sum(x^2 + y^2 + z^2) / N) — use magnitude of 3-axis vector"
      - "Calculate peak acceleration: max(sqrt(x^2 + y^2 + z^2)) over window"
      - "Integrate acceleration to velocity (frequency domain): V(f) = A(f) / (2π·f), then RMS of velocity spectrum"
      - "Create FreeRTOS task (dsp_task) on core 0, priority 10, consuming from sensor ring buffer in 1024-sample windows with 50% overlap"
      - "Output vibration_result_t to a result queue (depth 8) for MQTT publishing"
      - "Add unit tests: verify FFT of known sine wave produces correct frequency, RMS of constant signal equals constant"

    constraints:
      - "FFT size fixed at 1024 points (1.024s window at 1kHz)"
      - "50% overlap between windows for continuous monitoring"
      - "All floating-point math — no fixed-point (ESP32 has FPU)"
      - "Must use esp-dsp for FFT — no custom implementation"
      - "Processing must complete within half the window duration (512ms at 1kHz)"

    acceptance_criteria:
      - "FFT of 100Hz sine wave input produces dominant_freq_hz = 100.0 ± 1.0"
      - "RMS of constant 1g input produces rms_accel_g = 1.0 ± 0.01"
      - "Peak of known signal matches expected value"
      - "Processing 1024-sample window completes in < 500ms"
      - "Result queue receives one result per window"
      - "Unit tests pass"

    dependencies:
      hard:
        - "L1-02: Vibration Sensor Driver and Sampling"
      integrates_with: []

    handoff: |
      Provides:
      - signal_processing component with dsp_process_window()
      - vibration_result_t struct with RMS, peak, dominant frequency, FFT magnitudes
      - Result queue (FreeRTOS queue) for downstream consumers (MQTT, edge detection)

    verification: "idf.py build && idf.py -T signal_processing test"


  # ─────────────────────────────────────────────────
  # L1-04: MQTT Message Schema Definition
  # ─────────────────────────────────────────────────
  - title: "L1-04: MQTT Message Schema Definition"
    purpose: "Define the MQTT topic hierarchy and JSON payload schemas shared between firmware and backend"
    category: "DESIGN"

    input_context: |
      Firmware project bootstrapped (L1-01).
      This is a cross-layer contract: defines the interface between Layer 1 (ESP32) and Layer 2 (Backend).

    instructions:
      - "Create docs/mqtt_schema.yaml (or JSON Schema) defining all topics and payloads"
      - "Define topic: machines/{machine_id}/vibration — published by device every processing window"
      - |
        Vibration payload schema:
        {
          "machine_id": "string (UUID)",
          "sensor_id": "string (UUID)",
          "timestamp": "string (ISO 8601 UTC)",
          "rms_accel_g": "float",
          "peak_accel_g": "float",
          "rms_velocity_mm_s": "float",
          "dominant_freq_hz": "float",
          "fft_magnitudes": "array[float] (512 values, optional — only on request)",
          "firmware_version": "string (semver)"
        }
      - "Define topic: machines/{machine_id}/health — published every 60s"
      - |
        Health payload schema:
        {
          "sensor_id": "string (UUID)",
          "timestamp": "string (ISO 8601 UTC)",
          "uptime_s": "uint32",
          "free_heap_bytes": "uint32",
          "wifi_rssi_dbm": "int8",
          "battery_voltage_mv": "uint16 (0 if mains-powered)",
          "firmware_version": "string (semver)"
        }
      - "Define topic: machines/{machine_id}/alerts — published on edge-detected anomaly"
      - |
        Alert payload schema:
        {
          "machine_id": "string (UUID)",
          "sensor_id": "string (UUID)",
          "timestamp": "string (ISO 8601 UTC)",
          "alert_type": "string (enum: threshold_rms, threshold_peak, threshold_freq)",
          "severity": "string (enum: warning, critical)",
          "value": "float",
          "threshold": "float"
        }
      - "Define topic: devices/{sensor_id}/config — subscribed by device (backend → device)"
      - |
        Config payload schema:
        {
          "sampling_rate_hz": "uint16 (100, 500, 1000)",
          "reporting_interval_s": "uint16",
          "threshold_rms_warning": "float",
          "threshold_rms_critical": "float",
          "threshold_peak_warning": "float",
          "threshold_peak_critical": "float",
          "include_fft": "bool",
          "config_version": "uint32"
        }
      - "Define topic: devices/{sensor_id}/ota — OTA update trigger"
      - |
        OTA payload schema:
        {
          "firmware_url": "string (HTTPS URL)",
          "firmware_version": "string (semver)",
          "sha256": "string (hex)"
        }
      - "Define QoS levels: vibration=0 (best-effort), health=1 (at-least-once), alerts=1, config=1, ota=1"
      - "Create shared header file components/mqtt_schema/include/mqtt_topics.h with topic format strings and QoS constants"
      - "Create JSON serialization/deserialization helpers in components/mqtt_schema/mqtt_json.c using cJSON library"

    constraints:
      - "All timestamps ISO 8601 UTC (e.g., 2026-01-15T14:30:00.000Z)"
      - "machine_id and sensor_id are UUIDs assigned during provisioning"
      - "fft_magnitudes array is optional in vibration messages (controlled by include_fft config)"
      - "Maximum MQTT message size: 4KB (excluding FFT), 8KB (with FFT)"
      - "Topic names use lowercase with underscores in field names"

    acceptance_criteria:
      - "Schema document covers all 5 topics with complete field definitions"
      - "mqtt_topics.h compiles and provides topic format strings"
      - "JSON serialization round-trips all payload types without data loss"
      - "Serialized vibration payload (without FFT) fits in 4KB"
      - "Unit tests verify serialization/deserialization of all payload types"

    dependencies:
      hard:
        - "L1-01: Firmware Project Bootstrap"
      integrates_with: []

    handoff: |
      Provides:
      - MQTT topic hierarchy documentation (docs/mqtt_schema.yaml)
      - mqtt_topics.h with topic format strings and QoS constants
      - mqtt_json.c with cJSON serialization/deserialization for all payload types
      - Shared contract consumed by L2-05 (MQTT Ingestion Service)

    verification: "idf.py build && idf.py -T mqtt_schema test"


  # ─────────────────────────────────────────────────
  # L1-05: WiFi and MQTT Connectivity
  # ─────────────────────────────────────────────────
  - title: "L1-05: WiFi and MQTT Connectivity"
    purpose: "Establish WiFi and TLS-secured MQTT connection with automatic reconnection and topic subscription"
    category: "CONSTRUCTION"

    input_context: |
      MQTT schemas defined (L1-04): topic strings, QoS levels, JSON serializers.
      NVS available for storing WiFi credentials and broker config.
      Component directory: components/mqtt_client/

    instructions:
      - "Create components/mqtt_client/include/mqtt_manager.h with: mqtt_manager_init(config), mqtt_manager_publish(topic, payload, qos), mqtt_manager_subscribe(topic, qos, callback), mqtt_manager_is_connected()"
      - "Define mqtt_config_t: {char* broker_uri; char* client_id; char* username; char* password; const uint8_t* ca_cert; size_t ca_cert_len;}"
      - "Implement WiFi STA initialization using esp_wifi: connect with SSID/password from NVS"
      - "Implement WiFi reconnection with exponential backoff: 1s, 2s, 4s, 8s, 16s, max 30s"
      - "Implement MQTT client using esp_mqtt_client: TLS with CA certificate from SPIFFS, auto-reconnect enabled"
      - "On MQTT connect event: subscribe to devices/{sensor_id}/config (QoS 1) and devices/{sensor_id}/ota (QoS 1)"
      - "Implement publish function that queues messages if disconnected (up to 32 pending messages)"
      - "Create a connectivity status FreeRTOS event group with bits: WIFI_CONNECTED, MQTT_CONNECTED"
      - "Log connection state transitions to serial output"
      - "Add integration test: verify MQTT connect, publish, and subscribe against local Mosquitto broker"

    constraints:
      - "Must use TLS for MQTT (no plaintext connections)"
      - "Client ID must be unique per device (use MAC address or provisioned UUID)"
      - "Publish queue depth: 32 messages max — oldest dropped on overflow"
      - "WiFi reconnection must not block sensor sampling (runs on separate task)"
      - "MQTT keep-alive: 60 seconds"

    acceptance_criteria:
      - "Connects to WiFi and MQTT broker within 10s on startup (serial log confirms)"
      - "Reconnects automatically after WiFi/MQTT disconnection"
      - "Publishes message to correct topic with correct QoS"
      - "Receives messages on subscribed config topic"
      - "Queued messages are sent after reconnection"
      - "TLS handshake succeeds with valid CA certificate"

    dependencies:
      hard:
        - "L1-04: MQTT Message Schema Definition"
      integrates_with:
        - "L1-11: Secure Communication"

    handoff: |
      Provides:
      - mqtt_manager component with publish/subscribe API
      - Connectivity event group for other tasks to wait on
      - Subscribed callback mechanism for config and OTA topics

    verification: "idf.py build && idf.py -T mqtt_client test"


  # ─────────────────────────────────────────────────
  # L1-06: Data Buffering for Offline Operation
  # ─────────────────────────────────────────────────
  - title: "L1-06: Data Buffering for Offline Operation"
    purpose: "Buffer vibration results in PSRAM during connectivity loss and drain on reconnect"
    category: "CONSTRUCTION"

    input_context: |
      Signal processing (L1-03) outputs vibration_result_t to a result queue.
      MQTT manager (L1-05) provides connectivity status event group.
      PSRAM enabled and available.

    instructions:
      - "Create components/data_buffer/include/data_buffer.h with: buffer_init(capacity), buffer_push(vibration_result_t*), buffer_pop(vibration_result_t*), buffer_count(), buffer_is_full()"
      - "Implement persistent ring buffer in PSRAM: capacity 1000 vibration_result_t entries (~200KB)"
      - "Create a publisher task (priority 5, core 0) that: reads from DSP result queue, checks MQTT connectivity, if connected: publish immediately via mqtt_manager_publish, if disconnected: push to offline buffer"
      - "On MQTT reconnect event: drain offline buffer in chronological order, rate-limited to 10 messages/second to avoid broker overload"
      - "Add buffer overflow strategy: drop oldest entry when full, increment a dropped_count counter"
      - "Include dropped_count in next health telemetry message"
      - "Add unit tests: verify FIFO ordering, overflow behavior, drain ordering after simulated reconnect"

    constraints:
      - "Buffer must be in PSRAM (not heap) to preserve main RAM for tasks"
      - "Drain rate: max 10 msg/s to prevent broker/backend overload"
      - "Buffer entries must preserve original timestamps (no re-timestamping on drain)"
      - "Buffer state survives light sleep (PSRAM retained) but not deep sleep"

    acceptance_criteria:
      - "Buffered messages are published in chronological order after reconnect"
      - "Buffer overflow drops oldest and increments counter"
      - "Drain does not exceed 10 msg/s rate"
      - "No messages lost during normal operation (connected state)"
      - "Unit tests pass"

    dependencies:
      hard:
        - "L1-03: Signal Processing Pipeline"
        - "L1-05: WiFi and MQTT Connectivity"
      integrates_with: []

    handoff: |
      Provides:
      - Transparent publish-or-buffer layer between DSP output and MQTT
      - dropped_count metric for health reporting

    verification: "idf.py build && idf.py -T data_buffer test"


  # ─────────────────────────────────────────────────
  # L1-07: Edge Anomaly Detection and Local Alerting
  # ─────────────────────────────────────────────────
  - title: "L1-07: Edge Anomaly Detection and Local Alerting"
    purpose: "Compare vibration results against configurable thresholds and trigger local and remote alerts"
    category: "CONSTRUCTION"

    input_context: |
      Signal processing (L1-03) outputs vibration_result_t.
      MQTT manager (L1-05) can publish to machines/{id}/alerts topic.
      Config manager will provide threshold values (from NVS defaults or remote config).

    instructions:
      - "Create components/edge_detector/include/edge_detector.h with: edge_detector_init(thresholds), edge_detector_evaluate(vibration_result_t*, alert_t*), edge_detector_update_thresholds(thresholds)"
      - "Define alert_thresholds_t: {float rms_warning; float rms_critical; float peak_warning; float peak_critical;}"
      - "Define alert_t: {alert_type_t type; severity_t severity; float value; float threshold; int64_t timestamp;}"
      - "Implement threshold comparison: compare rms_accel_g and peak_accel_g against warning and critical thresholds"
      - "Implement cooldown: suppress duplicate alerts of same type for 60 seconds after last firing"
      - "On alert: publish JSON to machines/{machine_id}/alerts topic (QoS 1)"
      - "On alert: drive GPIO for LED (warning=yellow blink, critical=red solid) and buzzer (critical only, 1s pulse)"
      - "Load default thresholds from NVS on init; update when remote config received"
      - "Add unit tests: verify threshold logic, cooldown timing, severity classification"

    constraints:
      - "Cooldown period: 60 seconds per alert type (not global)"
      - "LED/buzzer GPIOs configurable via sdkconfig"
      - "Alert evaluation must be non-blocking (< 1ms per evaluation)"
      - "Thresholds can be updated at runtime without restart"

    acceptance_criteria:
      - "RMS value exceeding warning threshold produces warning alert"
      - "RMS value exceeding critical threshold produces critical alert"
      - "Duplicate alert within 60s cooldown is suppressed"
      - "Alert JSON published to correct MQTT topic"
      - "LED and buzzer activate on alert (GPIO toggle verified in test)"
      - "Unit tests pass"

    dependencies:
      hard:
        - "L1-03: Signal Processing Pipeline"
        - "L1-05: WiFi and MQTT Connectivity"
      integrates_with:
        - "L1-08: Remote Configuration and OTA"

    handoff: |
      Provides:
      - edge_detector component with runtime-updatable thresholds
      - Alert publishing to MQTT for backend consumption (L2-07)
      - Local indication via LED/buzzer

    verification: "idf.py build && idf.py -T edge_detector test"


  # ─────────────────────────────────────────────────
  # L1-08: Remote Configuration and OTA Updates
  # ─────────────────────────────────────────────────
  - title: "L1-08: Remote Configuration and OTA Updates"
    purpose: "Receive configuration changes and firmware updates via MQTT, apply them safely"
    category: "CONSTRUCTION"

    input_context: |
      MQTT manager (L1-05) provides subscribe callback for devices/{sensor_id}/config and devices/{sensor_id}/ota topics.
      NVS available for persistent config storage.
      Dual OTA partitions defined in partition table (L1-01).

    instructions:
      - "Create components/config_manager/include/config_manager.h with: config_init(), config_get(key, value), config_set(key, value), config_on_update(callback)"
      - "Implement MQTT config handler: parse JSON from devices/{sensor_id}/config, validate fields, store in NVS, notify registered callbacks"
      - "Configurable parameters: sampling_rate_hz, reporting_interval_s, threshold_rms_warning, threshold_rms_critical, threshold_peak_warning, threshold_peak_critical, include_fft"
      - "Implement config_version tracking: only apply config if incoming version > current version"
      - "Implement OTA handler: parse devices/{sensor_id}/ota message, download firmware from HTTPS URL, verify SHA256 hash, flash to inactive OTA partition, reboot"
      - "OTA progress: publish progress percentage to devices/{sensor_id}/ota/status topic"
      - "OTA rollback: if new firmware fails health check within 60s of boot, rollback to previous partition"
      - "Add integration test: verify config update round-trip (receive → store → read back)"

    constraints:
      - "Config updates must not require device reboot (hot-reload)"
      - "OTA download must not block sensor sampling (run on separate low-priority task)"
      - "OTA firmware must be verified (SHA256) before flashing"
      - "Config version must be monotonically increasing"
      - "Rollback triggered if app_main doesn't call esp_ota_mark_app_valid within 60s"

    acceptance_criteria:
      - "Config message updates NVS and triggers callbacks"
      - "Stale config (lower version) is rejected"
      - "OTA downloads, verifies, and flashes new firmware"
      - "OTA with wrong SHA256 is rejected (no flash)"
      - "Rollback occurs on failed boot (simulated)"
      - "Tests pass"

    dependencies:
      hard:
        - "L1-05: WiFi and MQTT Connectivity"
      integrates_with:
        - "L1-07: Edge Anomaly Detection"
        - "L1-02: Vibration Sensor Driver"

    handoff: |
      Provides:
      - config_manager component for reading/updating device parameters at runtime
      - OTA update mechanism consuming backend-pushed firmware URLs
      - Callback registration for config change notifications

    verification: "idf.py build && idf.py -T config_manager test"


  # ─────────────────────────────────────────────────
  # L1-09: Device Health Telemetry
  # ─────────────────────────────────────────────────
  - title: "L1-09: Device Health Telemetry"
    purpose: "Periodically publish device health metrics to the backend for fleet monitoring"
    category: "CONSTRUCTION"

    input_context: |
      MQTT manager (L1-05) provides publish API.
      MQTT schema (L1-04) defines health topic and payload.
      Data buffer (L1-06) exposes dropped_count.

    instructions:
      - "Create components/health_monitor/include/health_monitor.h with: health_monitor_init(interval_s), health_monitor_start(), health_monitor_stop()"
