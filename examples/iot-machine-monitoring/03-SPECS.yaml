      - "Create migration: users table — id (UUID PK), email (VARCHAR 255 UNIQUE), password_hash (VARCHAR 255), name (VARCHAR 255), role (ENUM: admin, engineer, viewer), created_at (TIMESTAMPTZ), updated_at (TIMESTAMPTZ)"
