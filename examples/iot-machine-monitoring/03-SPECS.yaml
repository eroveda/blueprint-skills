      - "Define power_config_t: {uint32_t active_duration_ms; uint32_t sleep_duration_ms; bool enable_sleep;}"
      - "Implement duty cycle: sample for active_duration_ms, then light sleep for sleep_duration_ms"
      - "Configure wake sources: timer (primary), GPIO (for external interrupt from sensor FIFO watermark)"
      - "Before sleep: ensure MQTT publish queue is drained, stop sensor sampling"
      - "After wake: restart sensor sampling, re-check MQTT connection"
      - "If power saving disabled (mains-powered): continuous sampling, no sleep"
      - "Log power state transitions to serial"
      - "Add unit test: verify state machine transitions (active → pre-sleep → sleep → wake → active)"

    constraints:
