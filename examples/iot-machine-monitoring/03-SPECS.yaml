  # ─────────────────────────────────────────────────
  # L2-03: API Contract Definition
  # ─────────────────────────────────────────────────
  - title: "L2-03: API Contract Definition"
    purpose: "Define REST API endpoints, request/response schemas, and WebSocket event format"
    category: "DESIGN"

    input_context: |
      Data models defined (L2-02): machines, sensors, users, alerts, vibration_readings, device_health.
      Backend framework initialized (L2-01).

    instructions:
      - "Create docs/openapi.yaml (OpenAPI 3.0 spec) with all endpoints:"
      - |
        Auth endpoints:
        POST /api/auth/login — {email, password} → {access_token, refresh_token, expires_in}
        POST /api/auth/refresh — {refresh_token} → {access_token, expires_in}
      - |
        Machine endpoints:
        GET /api/machines — list all machines (paginated, filterable by status, location)
        GET /api/machines/{id} — single machine with latest sensor readings
        POST /api/machines — create machine (admin only)
        PUT /api/machines/{id} — update machine (admin only)
        DELETE /api/machines/{id} — decommission machine (admin only, soft delete)
      - |
        Sensor endpoints:
        GET /api/machines/{id}/sensors — list sensors for a machine
        POST /api/machines/{id}/sensors — register sensor (admin only)
        PUT /api/sensors/{id} — update sensor metadata
        DELETE /api/sensors/{id} — decommission sensor (admin only)
        POST /api/sensors/{id}/config — push config to device
      - |
        Time-series endpoints:
        GET /api/machines/{id}/vibration — query vibration data
          Query params: start (ISO8601), end (ISO8601), interval (1s/1m/1h/1d), sensor_id (optional)
          Response: {data: [{time, rms_accel_g, peak_accel_g, rms_velocity_mm_s, dominant_freq_hz}], meta: {count, interval}}
        GET /api/machines/{id}/vibration/fft — FFT spectrum for a specific time window
          Query params: time (ISO8601), sensor_id
          Response: {frequencies: [float], magnitudes: [float]}
      - |
        Alert endpoints:
        GET /api/alerts — list alerts (filterable by machine_id, severity, status, date range)
        GET /api/alerts/{id} — single alert detail
        POST /api/alerts/{id}/acknowledge — acknowledge alert (engineer+)
        POST /api/alerts/{id}/resolve — resolve alert (engineer+)
        PUT /api/alerts/{id}/notes — update alert notes
      - |
        User endpoints (admin only):
        GET /api/users — list users
        POST /api/users — create user
        PUT /api/users/{id} — update user (role, name)
        DELETE /api/users/{id} — deactivate user
      - |
        Device health endpoint:
        GET /api/sensors/{id}/health — latest health metrics for a sensor
      - |
        WebSocket event format (ws://host/ws):
        Events pushed to clients:
        {type: "vibration", machine_id: "...", data: {...}}
        {type: "alert", alert: {...}}
        {type: "machine_status", machine_id: "...", status: "..."}
        {type: "device_health", sensor_id: "...", data: {...}}
      - "Define standard error response: {error: {code: string, message: string, details: object}}"
      - "Define pagination: {data: [...], pagination: {page, per_page, total, total_pages}}"
      - "Create response schema types/DTOs in codebase matching OpenAPI spec"

    constraints:
      - "All endpoints under /api/ prefix"
      - "Authentication via Bearer token (JWT) in Authorization header"
      - "Pagination: default 20 per page, max 100"
      - "Time-series queries: max range 30 days, default 24 hours"
      - "HTTP status codes: 200 (success), 201 (created), 204 (deleted), 400 (validation), 401 (unauthorized), 403 (forbidden), 404 (not found), 422 (unprocessable)"

    acceptance_criteria:
      - "OpenAPI spec validates with swagger-cli validate"
      - "All endpoints documented with request/response schemas"
      - "Error response format consistent across all endpoints"
      - "DTO/schema types created in codebase"

    dependencies:
      hard:
        - "L2-02: Data Models"
      integrates_with: []

    handoff: |
      Provides:
      - Complete OpenAPI spec at docs/openapi.yaml
      - DTO/schema types for request validation and response serialization
      - WebSocket event format specification
      - Contract consumed by Layer 3 (Dashboard) for API integration

    verification: "swagger-cli validate docs/openapi.yaml && make test"


