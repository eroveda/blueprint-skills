  # ─────────────────────────────────────────────────
  # L2-06: Anomaly Detection Engine
  # ─────────────────────────────────────────────────
  - title: "L2-06: Anomaly Detection Engine"
    purpose: "Analyze vibration data for anomalies using statistical methods and known failure patterns"
    category: "CONSTRUCTION"

    input_context: |
      Ingestion service (L2-05) forwards incoming vibration data and edge alerts.
      vibration_readings hypertable contains historical data for baseline calculation.

    instructions:
      - "Create src/anomaly/ module"
      - "Implement moving baseline calculator: compute mean and stddev of RMS and peak over trailing 24-hour window per machine"
      - "Implement z-score detector: flag readings where z-score > 3 (warning) or > 5 (critical) relative to baseline"
      - "Implement pattern matchers for known failure modes:"
      - "  - Bearing wear: elevated RMS with dominant frequency matching bearing defect frequency (BPFO/BPFI)"
      - "  - Imbalance: dominant frequency equals 1x rotation speed with elevated amplitude"
      - "  - Misalignment: elevated 2x rotation speed harmonic"
      - "Implement severity classification: info (z > 2), warning (z > 3 or pattern match), critical (z > 5 or rapid degradation trend)"
      - "Implement deduplication: suppress duplicate alerts for same machine + alert_type within 5 minutes"
      - "Implement cooldown: after alert is acknowledged, suppress same type for configurable duration (default 1 hour)"
      - "On anomaly detected: create alert record in alerts table, emit event for WebSocket and notification dispatch"
      - "Update machine status: set machines.status based on worst active alert severity"
      - "Add unit tests: verify z-score calculation, pattern matching on synthetic data, deduplication logic"

    constraints:
      - "Baseline window: 24 hours of data (require minimum 100 readings for valid baseline)"
      - "New machines (< 100 readings): use fixed thresholds from device config, not statistical"
      - "Deduplication window: 5 minutes"
      - "Pattern matching is optional (graceful degradation if rotation speed unknown)"
      - "Anomaly evaluation must complete in < 100ms per reading"

    acceptance_criteria:
      - "Z-score > 3 on synthetic data triggers warning alert"
      - "Z-score > 5 triggers critical alert"
      - "Duplicate alert within 5 minutes is suppressed"
      - "Acknowledged alert type suppressed for cooldown period"
      - "Machine status updates to 'critical' when critical alert is open"
      - "Machine status returns to 'healthy' when all alerts resolved"
      - "Unit tests pass"

    dependencies:
      hard:
        - "L2-05: MQTT Ingestion Service"
      integrates_with:
        - "L2-07: Alert Management Service"

    handoff: |
      Provides:
      - Anomaly detection pipeline processing every incoming vibration reading
      - Alert records created in alerts table
      - Machine status updated in machines table
      - Events emitted for WebSocket push and notification dispatch

    verification: "make test"


