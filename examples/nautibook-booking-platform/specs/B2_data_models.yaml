# ============================================================
# DEPENDENCIAS
# ============================================================
dependencies:
  hard:
    - "B1: Project Bootstrap — proyecto NestJS, TypeORM, PostgreSQL configurados"
  integrates_with:
    - "B3: API Contract — los DTOs de request/response se basan en estas entidades"
    - "B4: Auth — usa la entidad User para autenticacion y roles"
    - "B5: Escuelas y Spots — CRUD sobre entidades School y Spot"
    - "B6: Deportes — CRUD sobre entidades Sport y WeatherThreshold"
    - "B7: Instructores — CRUD sobre entidades Instructor y Schedule"
    - "B8: Motor Meteo — persiste en WeatherData"
    - "B9: Decision Climatica — lee WeatherData y WeatherThreshold, escribe WeatherDecisionLog"
    - "B10: Reservas — CRUD sobre Booking"
    - "B12: Pagos — CRUD sobre Payment y CreditPack"
    - "B13: Notificaciones — CRUD sobre Notification"

# ============================================================
# HANDOFF (lo que reciben los nodos downstream)
# ============================================================
handoff: |
  Expone para consumo downstream:
    - Entidades TypeORM completas para todas las tablas del sistema
    - Migracion inicial ejecutable y reversible
    - Seed de desarrollo con datos realistas para testing manual
    - Relaciones definidas:
      - School 1:N Sports, Spots, Instructors
      - Sport 1:N WeatherThresholds, Bookings
      - Instructor N:M Sports (via instructor_sports)
      - Instructor 1:N Schedules, Bookings
      - Schedule 1:N Bookings
      - User 1:N Bookings, Payments, CreditPacks, Notifications
      - Spot 1:N WeatherData
      - Booking 1:N Payments, WeatherDecisionLogs
    - Indices optimizados para las consultas mas frecuentes
    - 3 usuarios de prueba con credenciales conocidas (Test1234!)
    - 2 escuelas con spots y deportes configurados con umbrales meteorologicos

verification: "npm run migration:run && npm run seed && npm test -- --testPathPattern=database"
