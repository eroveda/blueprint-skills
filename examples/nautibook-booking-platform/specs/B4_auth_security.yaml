        - "should return 401 for invalid password"
        - "should return 401 for inactive user"

      Tokens:
        - "should generate access token with 15min expiry"
        - "should generate refresh token with 7d expiry"
        - "should refresh tokens with valid refresh token"
        - "should reject expired refresh token"
        - "should reject blacklisted refresh token"
        - "should rotate refresh token on refresh (old token invalidated)"

      Password Reset:
        - "should generate reset token and expiration"
        - "should not reveal if email exists (silent response)"
        - "should reset password with valid token"
        - "should reject expired reset token"
        - "should invalidate all sessions after password reset"

      OAuth:
        - "should create new user from Google OAuth data"
        - "should link Google OAuth to existing email account"
        - "should login existing OAuth user"

      RGPD:
        - "should export all user data"
        - "should anonymize user data on deletion"
        - "should not delete user record (preserve referential integrity)"
        - "should invalidate all tokens on account deletion"

      Mockear: UserRepository, JwtService, ConfigService, RedisService.

  - step: 14
    action: "Escribir tests unitarios de guards en src/common/__tests__/guards.spec.ts"
    detail: |
      Tests:

      JwtAuthGuard:
        - "should allow access with valid JWT"
        - "should deny access without JWT"
        - "should allow access to @Public() endpoints without JWT"

      RolesGuard:
        - "should allow access when no @Roles() decorator is present"
        - "should allow access when user has required role"
        - "should deny access when user does not have required role"
        - "should allow admin access to @Roles('admin') endpoints"
        - "should deny cliente access to @Roles('admin') endpoints"
        - "should allow multiple roles: @Roles('admin', 'instructor')"

  - step: 15
    action: "Escribir tests de integracion en src/modules/auth/__tests__/auth.integration.spec.ts"
    detail: |
      Tests con supertest contra la aplicacion NestJS:

        - "POST /api/auth/register should create user and return tokens"
        - "POST /api/auth/register with existing email should return 409"
        - "POST /api/auth/login with valid credentials should return tokens"
        - "POST /api/auth/login with invalid password should return 401"
        - "POST /api/auth/refresh with valid refresh token should return new tokens"
        - "POST /api/auth/refresh with invalid token should return 401"
        - "GET /api/auth/profile with valid token should return user data"
        - "GET /api/auth/profile without token should return 401"
        - "GET /api/auth/profile should not include password_hash or refresh_token"
        - "PATCH /api/auth/profile should update user name"
        - "POST /api/auth/password-reset should return 200 regardless of email existence"
        - "DELETE /api/auth/account should anonymize user data"
        - "Rate limiting should block after too many login attempts"

      Usar TestingModule con base de datos de test.

# ============================================================
# RESTRICCIONES
# ============================================================
constraints:
  - "Passwords hasheados con bcrypt, salt rounds 12 — nunca almacenar en texto plano"
  - "Access token expira en 15 minutos — no mas"
  - "Refresh token expira en 7 dias — rotacion obligatoria en cada uso"
  - "JWT secret minimo 256 bits — validar en configuracion"
  - "Refresh tokens anteriores se agregan a blacklist en Redis"
  - "Los endpoints de auth (login, register, reset) deben tener rate limiting estricto"
  - "Nunca revelar si un email existe o no en el endpoint de password reset"
  - "No exponer password_hash ni refresh_token en DTOs de respuesta"
  - "RGPD: el usuario puede exportar y eliminar sus datos en cualquier momento"
  - "Eliminacion de cuenta = anonimizacion, no borrado fisico (integridad referencial)"
  - "OAuth tokens del provider se validan server-side, nunca confiar en datos del cliente"
  - "Todos los endpoints excepto los marcados @Public() requieren JWT valido"

# ============================================================
# CRITERIOS DE ACEPTACION
# ============================================================
acceptance_criteria:
  - "POST /api/auth/register crea usuario y retorna tokens validos"
  - "POST /api/auth/login autentica con email+password y retorna tokens"
  - "POST /api/auth/oauth autentica via Google/Apple y retorna tokens"
  - "POST /api/auth/refresh rota tokens correctamente"
  - "POST /api/auth/logout invalida el refresh token"
  - "El access token expira en exactamente 15 minutos"
  - "El refresh token expira en exactamente 7 dias"
  - "Endpoints sin @Public() retornan 401 sin token JWT"
  - "Endpoints con @Roles('admin') retornan 403 para usuarios no admin"
  - "@CurrentUser() inyecta el usuario autenticado correctamente"
  - "POST /api/auth/password-reset inicia flujo de reset"
  - "GET /api/auth/data-export retorna todos los datos del usuario (RGPD)"
  - "DELETE /api/auth/account anonimiza los datos del usuario (RGPD)"
  - "Rate limiting bloquea tras multiples intentos fallidos de login"
  - "Los passwords se almacenan hasheados con bcrypt (salt 12)"
  - "Todos los tests unitarios y de integracion pasan"

# ============================================================
# DEPENDENCIAS
# ============================================================
dependencies:
  hard:
    - "B1: Project Bootstrap — NestJS, Redis, configuracion de variables de entorno"
    - "B2: Modelos de Datos — entidad User con campos de auth, OAuth y RGPD"
  integrates_with:
    - "B3: API Contract — endpoints de auth documentados en Swagger"
    - "B5: Escuelas — usa @Roles('admin') para proteger CRUD"
    - "B6: Deportes — usa @Roles('admin') para proteger configuracion"
    - "B7: Instructores — usa @Roles('admin', 'instructor') para proteger gestion"
    - "B10: Reservas — usa @CurrentUser() para filtrar reservas del usuario"
    - "B12: Pagos — usa @CurrentUser() para asociar pagos al usuario"
    - "B13: Notificaciones — necesita userId para enviar notificaciones de auth"

# ============================================================
# HANDOFF (lo que reciben los nodos downstream)
# ============================================================
handoff: |
  Expone para consumo downstream:
    - JwtAuthGuard global — todos los endpoints protegidos por defecto
    - @Public() decorador — para marcar endpoints sin autenticacion
    - @Roles('cliente', 'instructor', 'admin') decorador — para restringir por rol
    - RolesGuard global — verifica roles automaticamente
    - @CurrentUser() decorador — inyecta usuario autenticado en controllers
    - AuthService.register() — registro con email+password
    - AuthService.login() — autenticacion con email+password
    - AuthService.oauthLogin() — autenticacion con Google/Apple
    - AuthService.refreshTokens() — rotacion de tokens
    - AuthService.logout() — invalidacion de sesion
    - Flujo de password reset completo
    - Endpoints RGPD: data-export y account deletion
    - Rate limiting configurado: 5 intentos/minuto en login/register
    - ThrottlerGuard global con limites por defecto

verification: "npm test -- --testPathPattern=auth && npm test -- --testPathPattern=guards"
