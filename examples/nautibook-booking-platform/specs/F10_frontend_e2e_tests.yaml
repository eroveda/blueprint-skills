      Archivo e2e/components/calendar-picker.spec.ts:
        test.describe('CalendarPicker Component', () => {
          test('should allow date selection', ...);
          test('should disable past dates', ...);
          test('should disable dates beyond +30 days', ...);
          test('should show weather indicators on dates', ...);
        });

      Usar Playwright component testing o render en una test page.

  - step: 8
    action: "Implementar tests de accesibilidad en e2e/accessibility.spec.ts"
    detail: |
      npm install -D @axe-core/playwright

      test.describe('Accessibility (WCAG 2.1 AA)', () => {

        test('home page should have no accessibility violations', async ({ page }) => {
          await page.goto('/');
          const results = await new AxeBuilder({ page }).analyze();
          expect(results.violations).toEqual([]);
        });

        test('login page should have no accessibility violations', async ({ page }) => {
          await page.goto('/login');
          const results = await new AxeBuilder({ page }).analyze();
          expect(results.violations).toEqual([]);
        });

        test('classes page should have no accessibility violations', async ({ page }) => {
          await loginAsClient(page);
          await page.goto('/classes');
          const results = await new AxeBuilder({ page }).analyze();
          expect(results.violations).toEqual([]);
        });

        test('weather semaphore should be accessible without color alone', async ({ page }) => {
          await page.goto('/classes');
          const semaphores = page.locator('[data-testid="weather-semaphore"]');
          for (const semaphore of await semaphores.all()) {
            // Verify icon is present (not color-only)
            await expect(semaphore.locator('svg')).toBeVisible();
            // Verify aria-label is set
            await expect(semaphore).toHaveAttribute('aria-label', /.+/);
          }
        });

        test('all interactive elements should be keyboard focusable', async ({ page }) => {
          await page.goto('/');
          await page.keyboard.press('Tab');
          const focused = page.locator(':focus');
          await expect(focused).toBeVisible();
        });

        test('booking flow should be navigable with keyboard only', async ({ page }) => {
          await loginAsClient(page);
          await page.goto('/classes');
          // Navigate with Tab and Enter through the booking flow
          await page.keyboard.press('Tab'); // focus first class card
          await page.keyboard.press('Enter'); // open booking
          await expect(page.locator('[data-testid="booking-step-detail"]')).toBeVisible();
        });

      });

  - step: 9
    action: "Implementar tests de viewport mobile en e2e/mobile.spec.ts"
    detail: |
      Los tests mobile se ejecutan automáticamente en los projects 'mobile-chrome' y 'mobile-safari'
      definidos en playwright.config.ts. Adicionalmente, tests específicos:

      test.describe('Mobile Viewport Tests', () => {
        test.use({ viewport: { width: 375, height: 812 } }); // iPhone 14

        test('should show mobile bottom navigation', async ({ page }) => {
          await page.goto('/');
          await expect(page.locator('[data-testid="mobile-bottom-nav"]')).toBeVisible();
          await expect(page.locator('[data-testid="desktop-navbar-links"]')).not.toBeVisible();
        });

        test('should show hamburger menu instead of navbar links', async ({ page }) => {
          await page.goto('/');
          await expect(page.locator('[data-testid="hamburger-menu"]')).toBeVisible();
          await page.click('[data-testid="hamburger-menu"]');
          await expect(page.locator('[data-testid="mobile-menu-panel"]')).toBeVisible();
        });

        test('should stack class cards vertically', async ({ page }) => {
          await loginAsClient(page);
          await page.goto('/classes');
          const cards = page.locator('[data-testid="class-card"]');
          // Verify cards are stacked (each card takes full width)
          const firstCard = await cards.first().boundingBox();
          expect(firstCard?.width).toBeGreaterThan(350);
        });

        test('should show filters in a sheet on mobile', async ({ page }) => {
          await loginAsClient(page);
          await page.goto('/classes');
          await page.click('[data-testid="open-filters"]');
          await expect(page.locator('[data-testid="filters-sheet"]')).toBeVisible();
        });

        test('booking flow should be usable on mobile', async ({ page }) => {
          await loginAsClient(page);
          await page.goto('/classes');
          await page.click('[data-testid="class-card"]:first-child [data-testid="book-button"]');
          // Verify stepper is visible and usable
          await expect(page.locator('[data-testid="booking-stepper"]')).toBeVisible();
        });

      });

  - step: 10
    action: "Configurar scripts y CI integration"
    detail: |
      Añadir scripts a package.json:
        "test:e2e": "playwright test",
        "test:e2e:ui": "playwright test --ui",
        "test:e2e:chromium": "playwright test --project=chromium",
        "test:e2e:mobile": "playwright test --project=mobile-chrome --project=mobile-safari",
        "test:e2e:report": "playwright show-report"

      Crear .github/workflows/e2e.yml (o añadir job al CI existente):
        - Instalar dependencias
        - Instalar browsers de Playwright
        - npm run build
        - npm run test:e2e
        - Upload report artifact on failure

      Crear e2e/.eslintrc.json:
        - Extender configuración para Playwright (desactivar no-await-in-loop, etc.)

# ============================================================
# RESTRICCIONES
# ============================================================
constraints:
  - "Todos los tests usan MSW para mockear la API — no dependen del backend real"
  - "Tests deben pasar en los 3 projects: chromium, mobile-chrome, mobile-safari"
  - "Tests de accesibilidad deben cumplir WCAG 2.1 nivel AA"
  - "Cada test debe ser independiente — no depender del orden ni estado de otros tests"
  - "Screenshots y videos solo se guardan en fallos (no en éxito) para ahorrar espacio"
  - "Timeout por test: máximo 30 segundos"
  - "No usar selectores CSS frágiles — usar data-testid para elementos clave"
  - "Page Object Model para páginas complejas — no duplicar selectores en tests"

# ============================================================
# CRITERIOS DE ACEPTACIÓN
# ============================================================
acceptance_criteria:
  - "El flujo search→book→pay pasa end-to-end en chromium"
  - "El flujo muestra weather warning modal para clases con WARNING"
  - "La clase CANCELLED tiene botón de reserva deshabilitado"
  - "La notificación de cancelación por clima aparece con estilo correcto"
  - "El admin puede configurar umbrales con sliders y guardar"
  - "El instructor ve agenda con semáforo meteorológico y lista de alumnos"
  - "WeatherSemaphore renderiza los 3 estados correctamente"
  - "BookingCard muestra toda la información y botones según estado"
  - "Todas las páginas principales pasan audit de accesibilidad axe-core"
  - "El semáforo meteorológico es accesible sin depender solo del color"
  - "La UI es funcional en viewport mobile (375px)"
  - "Mobile bottom nav aparece y hamburger menu funciona"
  - "Todos los tests pasan en CI con Playwright"

# ============================================================
# DEPENDENCIAS
# ============================================================
dependencies:
  hard:
    - "F4: Buscador de Clases — páginas de búsqueda y resultados a testear"
    - "F5: Flujo de Reserva — stepper de booking y pago a testear"
    - "F6: Gestión de Reservas — página de mis reservas a testear"
    - "F9: Panel de Administración — dashboard y configuración a testear"
  integrates_with:
    - "F2: Design System — componentes a testear individualmente"
    - "F7: Notificaciones — NotificationBell a verificar"
    - "F8: Panel Instructor — agenda a testear"

# ============================================================
# HANDOFF (lo que reciben los nodos downstream)
# ============================================================
handoff: |
  Expone para consumo downstream:
    - Suite completa de tests E2E con Playwright en e2e/
    - MSW handlers reutilizables para mockear toda la API (e2e/mocks/)
    - Page Objects para páginas principales (e2e/helpers/page-objects/)
    - Tests de accesibilidad con axe-core integrado
    - Tests mobile en viewport 375px (iPhone 14) y 412px (Pixel 7)
    - Tests de componentes: WeatherSemaphore, BookingCard, CalendarPicker
    - Configuración de CI para ejecutar tests en GitHub Actions
    - Reportes de tests con screenshots y videos en fallos

verification: "cd frontend && npx playwright test --reporter=list"
